<div class="container">
  <div class="row mb-4">
    <div class="col-12">
      <h2 class="mb-3">商品列表</h2>
      
      <div class="card p-3 mb-4">
        <div class="row g-3">
          <div class="col-md-6">
            <div class="input-group">
              <input type="text" class="form-control" 
                     placeholder="搜索商品..."
                     [(ngModel)]="keyword"
                     (keyup.enter)="search()">
              <button class="btn btn-primary" (click)="search()">🔍 搜索</button>
            </div>
          </div>
          <div class="col-md-6">
            <div class="btn-group w-100">
              <button class="btn"
                      [class.btn-primary]="selectedCategory === null"
                      [class.btn-outline-secondary]="selectedCategory !== null"
                      (click)="filterByCategory(null)">
                全部
              </button>
              <button *ngFor="let category of categories"
                      class="btn"
                      [class.btn-primary]="selectedCategory === category.id"
                      [class.btn-outline-secondary]="selectedCategory !== category.id"
                      (click)="filterByCategory(category.id)">
                {{ category.icon }} {{ category.name }}
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="loading" class="spinner-container">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div *ngIf="!loading && products.length === 0" class="empty-state">
    <div class="empty-state-icon">🔍</div>
    <p class="empty-state-text">没有找到相关商品</p>
  </div>

  <div class="row g-4" *ngIf="!loading && products.length > 0">
    <div class="col-6 col-md-4 col-lg-3" *ngFor="let product of products">
      <div class="card product-card h-100" (click)="goToProduct(product.id)">
        <img [src]="getProductImage(product)" class="card-img-top" alt="{{ product.title }}">
        <div class="card-body">
          <h5 class="product-title">{{ product.title }}</h5>
          <p class="product-price mb-0">¥{{ product.price | number:'1.2-2' }}</p>
          <div class="d-flex justify-content-between align-items-center mt-2">
            <small class="text-muted">
              <span *ngIf="product.categoryName" class="me-2">{{ product.categoryName }}</span>
              👁 {{ product.viewCount }}
            </small>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="!loading && totalPages > 1" class="pagination-container">
    <nav>
      <ul class="pagination">
        <li class="page-item" [class.disabled]="currentPage === 0">
          <a class="page-link" (click)="currentPage > 0 && goToPage(currentPage - 1)">上一页</a>
        </li>
        <li class="page-item" *ngFor="let page of pages"
            [class.active]="page === currentPage">
          <a class="page-link" (click)="goToPage(page)">{{ page + 1 }}</a>
        </li>
        <li class="page-item" [class.disabled]="currentPage === totalPages - 1">
          <a class="page-link" (click)="currentPage < totalPages - 1 && goToPage(currentPage + 1)">下一页</a>
        </li>
      </ul>
    </nav>
  </div>
</div>
