<div class="hero-section">
  <div class="container">
    <h1 class="hero-title">校园二手书交易平台</h1>
    <p class="hero-subtitle mb-4">让闲置物品流动起来，让青春记忆延续下去</p>
    
    <div class="row justify-content-center">
      <div class="col-md-6">
        <div class="input-group">
          <input type="text" class="form-control search-input" 
                 placeholder="搜索二手书籍、数码产品、生活用品..."
                 [(ngModel)]="searchKeyword"
                 (keyup.enter)="search()">
          <button class="btn btn-primary search-btn" (click)="search()">
            🔍 搜索
          </button>
        </div>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <div class="row mb-5">
    <div class="col-12">
      <h3 class="mb-4">📦 热门分类</h3>
      <div class="row g-3">
        <div class="col-6 col-md-4 col-lg-2" *ngFor="let category of categories">
          <div class="card category-card" (click)="goToCategory(category.id)">
            <div class="category-icon">{{ category.icon }}</div>
            <div class="fw-semibold">{{ category.name }}</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="row">
    <div class="col-12 d-flex justify-content-between align-items-center mb-4">
      <h3>🔥 最新发布</h3>
      <a routerLink="/products" class="text-primary">查看更多 →</a>
    </div>
  </div>

  <div *ngIf="loading" class="spinner-container">
    <div class="spinner-border text-primary" role="status">
      <span class="visually-hidden">Loading...</span>
    </div>
  </div>

  <div *ngIf="!loading && products.length === 0" class="empty-state">
    <div class="empty-state-icon">📚</div>
    <p class="empty-state-text">暂无商品，快来发布第一个闲置物品吧！</p>
  </div>

  <div class="row g-4" *ngIf="!loading && products.length > 0">
    <div class="col-6 col-md-4 col-lg-3" *ngFor="let product of products">
      <div class="card product-card h-100" (click)="goToProduct(product.id)">
        <img [src]="getProductImage(product)" class="card-img-top" alt="{{ product.title }}">
        <div class="card-body">
          <h5 class="product-title">{{ product.title }}</h5>
          <p class="product-price mb-0">¥{{ product.price | number:'1.2-2' }}</p>
          <div class="d-flex justify-content-between align-items-center mt-2">
            <small class="text-muted">👁 {{ product.viewCount }}</small>
            <span class="badge bg-success">已审核</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
