<div class="container mt-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card">
        <div class="card-header bg-light">
          <h3 class="mb-0">{{ isEditMode ? '编辑商品' : '发布闲置物品' }}</h3>
        </div>
        <div class="card-body p-5">
          
          <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
          <div *ngIf="success" class="alert alert-success">{{ success }}</div>
          
          <form [formGroup]="productForm" (ngSubmit)="onSubmit()">
            
            <div class="mb-4">
              <label class="form-label fw-semibold">商品标题 *</label>
              <input type="text" formControlName="title" class="form-control"
                     placeholder="请输入商品标题（100字以内）"
                     [ngClass]="{ 'is-invalid': submitted && f['title'].errors }">
              <div *ngIf="submitted && f['title'].errors" class="invalid-feedback">
                <div *ngIf="f['title'].errors['required']">请输入商品标题</div>
                <div *ngIf="f['title'].errors['maxlength']">标题不能超过100个字符</div>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">商品描述</label>
              <textarea formControlName="description" class="form-control" rows="4"
                        placeholder="请详细描述您的商品（2000字以内）"
                        [ngClass]="{ 'is-invalid': submitted && f['description'].errors }"></textarea>
              <div *ngIf="submitted && f['description'].errors" class="invalid-feedback">
                描述不能超过2000个字符
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-4">
                <label class="form-label fw-semibold">价格 (¥) *</label>
                <input type="number" formControlName="price" class="form-control"
                       placeholder="0.00" step="0.01" min="0.01"
                       [ngClass]="{ 'is-invalid': submitted && f['price'].errors }">
                <div *ngIf="submitted && f['price'].errors" class="invalid-feedback">
                  请输入有效的价格
                </div>
              </div>

              <div class="col-md-6 mb-4">
                <label class="form-label fw-semibold">商品分类</label>
                <select formControlName="categoryId" class="form-select">
                  <option value="">请选择分类</option>
                  <option *ngFor="let category of categories" [value]="category.id">
                    {{ category.icon }} {{ category.name }}
                  </option>
                </select>
              </div>
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">商品图片</label>
              <input type="text" formControlName="images" class="form-control"
                     placeholder="请输入图片URL（多个图片用逗号分隔）">
              <small class="text-muted">例如：https://example.com/img1.jpg,https://example.com/img2.jpg</small>
            </div>

            <div class="mb-5">
              <label class="form-label fw-semibold">联系方式</label>
              <input type="text" formControlName="contactInfo" class="form-control"
                     placeholder="请输入您的联系方式（手机号、QQ、微信等）">
              <small class="text-muted">买家将通过此方式联系您</small>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary btn-lg" [disabled]="loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                {{ isEditMode ? '保存修改' : '发布商品' }}
              </button>
              <button type="button" class="btn btn-outline-secondary" (click)="router.navigate(['/products/my'])">
                取消
              </button>
            </div>

          </form>

        </div>
      </div>

      <div class="card mt-4 bg-light">
        <div class="card-body">
          <h6 class="fw-semibold mb-2">📋 发布须知</h6>
          <ul class="text-muted small mb-0">
            <li>商品发布后需要管理员审核才能显示</li>
            <li>请如实填写商品信息，禁止发布虚假信息</li>
            <li>禁止发布违法违规商品</li>
            <li>建议上传真实的商品图片</li>
          </ul>
        </div>
      </div>
    </div>
  </div>
</div>
