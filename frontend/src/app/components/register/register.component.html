<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
      <div class="card shadow">
        <div class="card-body p-5">
          <h2 class="text-center mb-4">创建账户</h2>
          <p class="text-center text-muted mb-4">加入我们的校园二手交易平台</p>
          
          <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
          <div *ngIf="success" class="alert alert-success">{{ success }}</div>
          
          <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">用户名 *</label>
                <input type="text" formControlName="username" class="form-control"
                       [ngClass]="{ 'is-invalid': submitted && f['username'].errors }">
                <div *ngIf="submitted && f['username'].errors" class="invalid-feedback">
                  <div *ngIf="f['username'].errors['required']">请输入用户名</div>
                  <div *ngIf="f['username'].errors['minlength']">用户名至少3个字符</div>
                  <div *ngIf="f['username'].errors['maxlength']">用户名最多20个字符</div>
                </div>
              </div>
              
              <div class="col-md-6 mb-3">
                <label class="form-label">昵称 *</label>
                <input type="text" formControlName="nickname" class="form-control"
                       [ngClass]="{ 'is-invalid': submitted && f['nickname'].errors }">
                <div *ngIf="submitted && f['nickname'].errors" class="invalid-feedback">
                  <div *ngIf="f['nickname'].errors['required']">请输入昵称</div>
                  <div *ngIf="f['nickname'].errors['minlength']">昵称至少2个字符</div>
                </div>
              </div>
            </div>
            
            <div class="mb-3">
              <label class="form-label">邮箱 *</label>
              <input type="email" formControlName="email" class="form-control"
                     [ngClass]="{ 'is-invalid': submitted && f['email'].errors }">
              <div *ngIf="submitted && f['email'].errors" class="invalid-feedback">
                请输入有效的邮箱地址
              </div>
            </div>
            
            <div class="mb-3">
              <label class="form-label">手机号</label>
              <input type="tel" formControlName="phone" class="form-control">
            </div>
            
            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">密码 *</label>
                <input type="password" formControlName="password" class="form-control"
                       [ngClass]="{ 'is-invalid': submitted && f['password'].errors }">
                <div *ngIf="submitted && f['password'].errors" class="invalid-feedback">
                  <div *ngIf="f['password'].errors['required']">请输入密码</div>
                  <div *ngIf="f['password'].errors['minlength']">密码至少6个字符</div>
                </div>
              </div>
              
              <div class="col-md-6 mb-3">
                <label class="form-label">确认密码 *</label>
                <input type="password" formControlName="confirmPassword" class="form-control"
                       [ngClass]="{ 'is-invalid': submitted && f['confirmPassword'].errors }">
                <div *ngIf="submitted && f['confirmPassword'].errors" class="invalid-feedback">
                  <div *ngIf="f['confirmPassword'].errors['required']">请确认密码</div>
                  <div *ngIf="f['confirmPassword'].errors['mustMatch']">两次密码不一致</div>
                </div>
              </div>
            </div>
            
            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg" [disabled]="loading">
                <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                注册
              </button>
            </div>
          </form>
          
          <div class="text-center mt-4">
            <p>已有账户？<a routerLink="/login" class="text-primary">立即登录</a></p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
